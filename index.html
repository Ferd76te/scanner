<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1117">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Napolitrans">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230f1117' width='100' height='100' rx='20'/><text y='68' x='50' text-anchor='middle' font-size='55'>🚛</text></svg>">
<title>Napolitrans Scanner</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0f1117; --surface: #1a1d27; --surface2: #232733; --border: #2e3345;
  --text: #e8eaf0; --dim: #8b90a5; --accent: #4e8cff; --green: #34d399;
  --orange: #f59e0b; --red: #ef4444;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text);
  display: flex; flex-direction: column;
}

/* ─── STATUS BAR ─── */
.status-bar {
  padding: max(env(safe-area-inset-top), 8px) 16px 10px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  flex-shrink: 0;
}
.app-title { font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.conn-info { display: flex; align-items: center; gap: 8px; }
.operator-name {
  font-size: 11px; color: var(--dim); font-weight: 600;
  background: var(--surface2); padding: 4px 10px; border-radius: 8px;
  max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.connection-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; flex-shrink: 0; }
.connection-dot.offline { background: var(--red); animation: none; }
@keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.4 } }

/* ─── TABS ─── */
.tab-bar { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.tab {
  flex: 1; padding: 11px 0; text-align: center; font-size: 13px; font-weight: 600;
  color: var(--dim); border-bottom: 2px solid transparent; cursor: pointer;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ─── PAGES ─── */
.page-container { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.page { display: none; padding: 14px 14px max(env(safe-area-inset-bottom, 16px), 16px); }
.page.active { display: block; }

/* ─── SCANNER ─── */
#qr-reader { width: 100%; border-radius: 14px; overflow: hidden; margin-bottom: 12px; background: #000; }
#qr-reader video { border-radius: 14px; }
#qr-reader__dashboard, #qr-reader__header_message { display: none !important; }
.scan-hint { text-align: center; font-size: 13px; color: var(--dim); margin-bottom: 12px; }
.scanner-controls { display: flex; gap: 8px; margin-bottom: 14px; }
.ctrl-btn {
  flex: 1; padding: 10px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 600; cursor: pointer; text-align: center;
}
.ctrl-btn:active { background: var(--surface2); }
.ctrl-btn.active { border-color: var(--accent); color: var(--accent); }

/* ─── RESULT CARD ─── */
.scan-result {
  display: none; background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px; animation: slideUp .25s ease;
}
.scan-result.show { display: block; }
@keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

.result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.result-id { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 700; color: var(--accent); }
.result-badge { font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 16px; text-transform: uppercase; letter-spacing: .5px; }
.badge-attesa { background: rgba(245,158,11,.15); color: var(--orange); }
.badge-caricato { background: rgba(52,211,153,.15); color: var(--green); }
.badge-errore, .badge-not-found { background: rgba(239,68,68,.15); color: var(--red); }

.result-details { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.result-item label { font-size: 9px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; }
.result-item .value { font-size: 15px; font-weight: 700; color: var(--text); margin-top: 1px; }
.result-item.full { grid-column: 1 / -1; }
.result-item.full .value { font-size: 20px; }

.action-buttons { display: flex; gap: 8px; }
.btn {
  flex: 1; padding: 13px; border: none; border-radius: 11px; font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center;
  justify-content: center; gap: 6px;
}
.btn:active { transform: scale(.97); }
.btn-confirm { background: var(--green); color: #fff; }
.btn-wrong { background: var(--surface2); color: var(--red); border: 1px solid var(--border); }
.btn-new-scan { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 10px; }

/* ─── ORDINI ─── */
.ordini-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.section-title { font-size: 11px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: 1.5px; }
.refresh-btn { padding: 5px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--dim); font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; }

.progress-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 12px; }
.progress-label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; }
.progress-label .count { color: var(--green); font-weight: 700; font-family: 'JetBrains Mono', monospace; }
.progress-track { height: 7px; background: var(--border); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--green), var(--accent)); border-radius: 4px; transition: width .4s ease; }

.ordine-card { background: var(--surface); border: 1px solid var(--border); border-radius: 11px; padding: 12px; margin-bottom: 7px; display: flex; align-items: center; gap: 10px; }
.ordine-info { flex: 1; min-width: 0; }
.ordine-info .client { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ordine-info .dest { font-size: 11px; color: var(--dim); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ordine-check { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
.ordine-check.done { background: rgba(52,211,153,.15); color: var(--green); }
.ordine-check.pending { background: var(--surface2); border: 2px solid var(--border); }
.ordine-check.error { background: rgba(239,68,68,.15); color: var(--red); }

/* ─── LOG ─── */
.log-entry { background: var(--surface); border: 1px solid var(--border); border-radius: 11px; padding: 12px; margin-bottom: 7px; display: flex; align-items: center; gap: 10px; }
.log-icon { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.log-icon.ok { background: rgba(52,211,153,.15); color: var(--green); }
.log-icon.err { background: rgba(239,68,68,.15); color: var(--red); }
.log-info { flex: 1; min-width: 0; }
.log-info .log-id { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; }
.log-info .log-detail { font-size: 11px; color: var(--dim); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.log-time { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--dim); flex-shrink: 0; }

.empty-state { text-align: center; padding: 50px 20px; color: var(--dim); }
.empty-state .icon { font-size: 40px; margin-bottom: 10px; }
.empty-state .title { font-size: 15px; font-weight: 700; color: var(--text); }

/* ─── SETUP ─── */
.setup-overlay {
  position: fixed; inset: 0; background: var(--bg); z-index: 300;
  display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 30px 20px;
}
.setup-overlay.hidden { display: none; }
.setup-field { width: 100%; max-width: 340px; margin-bottom: 14px; }
.setup-field label { font-size: 10px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 5px; }
.setup-field input {
  width: 100%; padding: 13px 14px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 11px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none;
}
.setup-field input:focus { border-color: var(--accent); }
.setup-field input::placeholder { color: var(--dim); }
.setup-btn {
  width: 100%; max-width: 340px; padding: 15px; background: var(--accent); color: #fff;
  border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer;
}
.setup-btn:disabled { opacity: .5; }
.setup-error { color: var(--red); font-size: 12px; margin-top: 10px; max-width: 340px; text-align: center; }
.setup-hint { color: var(--dim); font-size: 11px; margin-top: 14px; max-width: 340px; text-align: center; line-height: 1.5; }

/* ─── OVERLAYS ─── */
.loading-overlay { display: none; position: fixed; inset: 0; background: rgba(15,17,23,.85); z-index: 200; align-items: center; justify-content: center; flex-direction: column; gap: 10px; }
.loading-overlay.show { display: flex; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--dim); }

.toast {
  position: fixed; bottom: max(env(safe-area-inset-bottom, 20px), 20px); left: 50%;
  transform: translateX(-50%) translateY(80px); padding: 12px 22px; border-radius: 12px;
  font-size: 13px; font-weight: 700; opacity: 0; transition: all .25s; z-index: 150;
  text-align: center; min-width: 240px; max-width: 90vw;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast.success { background: var(--green); color: #fff; }
.toast.error { background: var(--red); color: #fff; }
</style>
</head>
<body>

<!-- ═══ SETUP SCREEN ═══ -->
<div id="setup" class="setup-overlay">
  <div style="font-size:52px;margin-bottom:10px;">🚛</div>
  <div style="font-size:22px;font-weight:800;margin-bottom:4px;">Napolitrans</div>
  <div style="font-size:13px;color:var(--dim);margin-bottom:28px;">Scanner magazzino</div>

  <div class="setup-field">
    <label>URL Web App</label>
    <input type="url" id="s-url" placeholder="https://script.google.com/macros/s/.../exec">
  </div>
  <div class="setup-field">
    <label>Nome operatore</label>
    <input type="text" id="s-op" placeholder="Es: Mario">
  </div>
  <button class="setup-btn" id="s-btn" onclick="doSetup()">Connetti</button>
  <div class="setup-error" id="s-err"></div>
  <div class="setup-hint">L'URL lo trovi in Apps Script → Deploy → Gestisci deployment</div>
</div>

<!-- ═══ APP ═══ -->
<div id="app" style="display:none;flex:1;display:flex;flex-direction:column;height:100%;">

  <div class="status-bar">
    <div class="app-title"><span>🚛</span> <span>Scanner</span></div>
    <div class="conn-info">
      <span class="operator-name" id="d-op"></span>
      <div class="connection-dot" id="d-dot"></div>
    </div>
  </div>

  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('scanner',this)">📷 Scanner</div>
    <div class="tab" onclick="switchTab('ordini',this)">📦 Ordini</div>
    <div class="tab" onclick="switchTab('log',this)">📋 Log</div>
  </div>

  <div class="page-container">

    <!-- SCANNER -->
    <div id="page-scanner" class="page active">
      <div id="qr-reader"></div>
      <p class="scan-hint" id="scan-hint">Inquadra il QR code sull'etichetta</p>
      <div class="scanner-controls">
        <button class="ctrl-btn active" onclick="toggleScan()" id="btn-tog">⏸ Pausa</button>
        <button class="ctrl-btn" onclick="document.getElementById('setup').classList.remove('hidden');document.getElementById('setup').style.display='flex';">⚙️ Config</button>
      </div>
      <div class="scan-result" id="scan-result">
        <div class="result-header">
          <span class="result-id" id="r-id"></span>
          <span class="result-badge" id="r-badge"></span>
        </div>
        <div class="result-details">
          <div class="result-item"><label>Committente</label><div class="value" id="r-comm"></div></div>
          <div class="result-item"><label>Data Scarico</label><div class="value" id="r-data"></div></div>
          <div class="result-item full"><label>Destinazione</label><div class="value" id="r-dest"></div></div>
        </div>
        <div class="action-buttons" id="r-actions">
          <button class="btn btn-confirm" onclick="doConferma()">✓ Caricato</button>
          <button class="btn btn-wrong" onclick="doErrore()">✕ Errore</button>
        </div>
        <button class="btn btn-new-scan" onclick="resetScan()">📷 Nuova scansione</button>
      </div>
    </div>

    <!-- ORDINI -->
    <div id="page-ordini" class="page">
      <div class="ordini-header">
        <span class="section-title">Ordini</span>
        <button class="refresh-btn" onclick="loadOrdini()">↻ Aggiorna</button>
      </div>
      <div class="progress-box">
        <div class="progress-label"><span style="color:var(--dim)">Caricati</span><span class="count" id="p-count">0/0</span></div>
        <div class="progress-track"><div class="progress-fill" id="p-bar" style="width:0%"></div></div>
      </div>
      <div id="ordini-list"></div>
    </div>

    <!-- LOG -->
    <div id="page-log" class="page">
      <div class="ordini-header">
        <span class="section-title">Log scansioni</span>
        <button class="refresh-btn" onclick="renderLog()">↻</button>
      </div>
      <div id="log-list"><div class="empty-state"><div class="icon">📋</div><div class="title">Nessuna scansione</div></div></div>
    </div>

  </div>
</div>

<div class="loading-overlay" id="loading"><div class="spinner"></div><div class="loading-text" id="l-text">...</div></div>
<div class="toast" id="toast"></div>

<script>
// ═══ STATE ═══
let API = localStorage.getItem('nt_url') || '';
let OP = localStorage.getItem('nt_op') || '';
let qr = null, active = false, cur = null, ordini = [];
let log = JSON.parse(localStorage.getItem('nt_log') || '[]');
let lastT = 0;

// ═══ INIT ═══
window.addEventListener('DOMContentLoaded', () => {
  if (API && OP) startApp();
  else { document.getElementById('s-url').value = API; document.getElementById('s-op').value = OP; }
});

// ═══ SETUP ═══
async function doSetup() {
  const url = document.getElementById('s-url').value.trim();
  const op = document.getElementById('s-op').value.trim();
  const err = document.getElementById('s-err');
  err.textContent = '';
  if (!url || !op) { err.textContent = 'Compila entrambi i campi'; return; }
  document.getElementById('s-btn').disabled = true;
  document.getElementById('s-btn').textContent = 'Connessione...';
  try {
    const r = await fetch(url + '?action=ping');
    const d = await r.json();
    if (d.ok) { API = url; OP = op; localStorage.setItem('nt_url', url); localStorage.setItem('nt_op', op); startApp(); }
    else { err.textContent = 'Errore: ' + (d.error || 'risposta non valida'); }
  } catch(e) { err.textContent = 'Connessione fallita: ' + e.message; }
  document.getElementById('s-btn').disabled = false;
  document.getElementById('s-btn').textContent = 'Connetti';
}

function startApp() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('d-op').textContent = OP;
  initQR();
  loadOrdini();
}

// ═══ QR SCANNER ═══
function initQR() {
  if (qr) { try { qr.stop(); } catch(e) {} }
  qr = new Html5Qrcode('qr-reader');
  qr.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 200, height: 200 }, aspectRatio: 1.0 },
    onScan, () => {}
  ).then(() => { active = true; })
   .catch(e => { document.getElementById('scan-hint').textContent = 'Errore fotocamera: ' + e; });
}

function toggleScan() {
  if (!qr) return;
  if (active) { qr.pause(true); active = false; document.getElementById('btn-tog').textContent = '▶ Riprendi'; document.getElementById('btn-tog').classList.remove('active'); }
  else { qr.resume(); active = true; document.getElementById('btn-tog').textContent = '⏸ Pausa'; document.getElementById('btn-tog').classList.add('active'); }
}

async function onScan(text) {
  if (Date.now() - lastT < 2000) return;
  lastT = Date.now();
  if (navigator.vibrate) navigator.vibrate(100);
  if (qr && active) { qr.pause(true); active = false; }
  showL('Ricerca ' + text + '...');
  try {
    const r = await fetch(API + '?action=getOrdine&id=' + encodeURIComponent(text));
    const d = await r.json(); hideL();
    if (d.ok) { cur = d.ordine; showRes(d.ordine); } else showNF(text);
  } catch(e) { hideL(); toast('Errore rete', 'error'); resetScan(); }
}

function showRes(o) {
  document.getElementById('r-id').textContent = o.id;
  document.getElementById('r-comm').textContent = o.committente;
  document.getElementById('r-dest').textContent = o.destinatario + ' — ' + o.luogo_scarico;
  document.getElementById('r-data').textContent = o.data_scarico;
  const b = document.getElementById('r-badge'), a = document.getElementById('r-actions');
  if (o.scan_stato === 'caricato') { b.textContent = 'Già caricato'; b.className = 'result-badge badge-caricato'; a.style.display = 'none'; }
  else if (o.scan_stato && o.scan_stato.startsWith('errore')) { b.textContent = 'Errore'; b.className = 'result-badge badge-errore'; a.style.display = 'flex'; }
  else { b.textContent = 'In attesa'; b.className = 'result-badge badge-attesa'; a.style.display = 'flex'; }
  document.getElementById('scan-result').classList.add('show');
}

function showNF(id) {
  document.getElementById('r-id').textContent = id;
  document.getElementById('r-comm').textContent = '-';
  document.getElementById('r-dest').textContent = 'NON TROVATO';
  document.getElementById('r-data').textContent = '-';
  document.getElementById('r-badge').textContent = 'Non trovato';
  document.getElementById('r-badge').className = 'result-badge badge-not-found';
  document.getElementById('r-actions').style.display = 'none';
  document.getElementById('scan-result').classList.add('show');
  if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 100]);
}

async function doConferma() {
  if (!cur) return; showL('Salvataggio...');
  try {
    const r = await fetch(API, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: 'confermaCarico', id: cur.id, operatore: OP }) });
    const d = await r.json(); hideL();
    if (d.ok) { addLog(cur.id, cur.destinatario + ' — ' + cur.luogo_scarico, 'ok'); toast('✓ ' + cur.id + ' caricato!', 'success'); const c = ordini.find(x => x.id === cur.id); if (c) c.scan_stato = 'caricato'; }
    else toast('Errore: ' + d.error, 'error');
  } catch(e) { hideL(); toast('Errore rete', 'error'); }
}

async function doErrore() {
  if (!cur) return; showL('Segnalazione...');
  try {
    const r = await fetch(API, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: 'segnalaErrore', id: cur.id, operatore: OP, note: 'Bancale sbagliato' }) });
    const d = await r.json(); hideL();
    if (d.ok) { addLog(cur.id, cur.destinatario + ' — ' + cur.luogo_scarico, 'err'); toast('✕ Errore segnalato', 'error'); if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 100]); }
    else toast('Errore: ' + d.error, 'error');
  } catch(e) { hideL(); toast('Errore rete', 'error'); }
}

function resetScan() {
  cur = null; document.getElementById('scan-result').classList.remove('show');
  if (qr && !active) { qr.resume(); active = true; document.getElementById('btn-tog').textContent = '⏸ Pausa'; document.getElementById('btn-tog').classList.add('active'); }
}

// ═══ ORDINI ═══
async function loadOrdini() {
  document.getElementById('ordini-list').innerHTML = '<div style="text-align:center;padding:40px;color:var(--dim)">Caricamento...</div>';
  try {
    const r = await fetch(API + '?action=getOrdini'); const d = await r.json();
    if (d.ok) { ordini = d.ordini; renderOrdini(); document.getElementById('d-dot').classList.remove('offline'); }
    else document.getElementById('ordini-list').innerHTML = '<div style="text-align:center;padding:40px;color:var(--red)">' + d.error + '</div>';
  } catch(e) { document.getElementById('ordini-list').innerHTML = '<div style="text-align:center;padding:40px;color:var(--red)">Offline</div>'; document.getElementById('d-dot').classList.add('offline'); }
}

function renderOrdini() {
  const done = ordini.filter(o => o.scan_stato === 'caricato').length, tot = ordini.length;
  document.getElementById('p-count').textContent = done + ' / ' + tot;
  document.getElementById('p-bar').style.width = (tot > 0 ? done / tot * 100 : 0) + '%';
  document.getElementById('ordini-list').innerHTML = ordini.map(o => {
    const s = o.scan_stato === 'caricato' ? 'done' : (o.scan_stato && o.scan_stato.startsWith('errore') ? 'error' : 'pending');
    return '<div class="ordine-card"><div class="ordine-info"><div class="client">' + o.destinatario + '</div><div class="dest">' + o.luogo_scarico + ' · ' + o.committente + '</div></div><div class="ordine-check ' + s + '">' + (s === 'done' ? '✓' : s === 'error' ? '✕' : '') + '</div></div>';
  }).join('');
}

// ═══ LOG ═══
function addLog(id, detail, type) {
  const n = new Date(), t = n.getHours().toString().padStart(2, '0') + ':' + n.getMinutes().toString().padStart(2, '0');
  log.unshift({ id, detail, type, time: t }); if (log.length > 50) log = log.slice(0, 50);
  localStorage.setItem('nt_log', JSON.stringify(log));
}

function renderLog() {
  const el = document.getElementById('log-list');
  if (!log.length) { el.innerHTML = '<div class="empty-state"><div class="icon">📋</div><div class="title">Nessuna scansione</div></div>'; return; }
  el.innerHTML = log.map(e => '<div class="log-entry"><div class="log-icon ' + e.type + '">' + (e.type === 'ok' ? '✓' : '✕') + '</div><div class="log-info"><div class="log-id">' + e.id + '</div><div class="log-detail">' + e.detail + '</div></div><div class="log-time">' + e.time + '</div></div>').join('');
}

// ═══ UI ═══
function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  el.classList.add('active'); document.getElementById('page-' + tab).classList.add('active');
  if (tab === 'ordini') loadOrdini(); if (tab === 'log') renderLog();
  if (tab === 'scanner' && qr && !active) { qr.resume(); active = true; }
  if (tab !== 'scanner' && qr && active) { qr.pause(true); active = false; }
}

function toast(m, t) { const e = document.getElementById('toast'); e.textContent = m; e.className = 'toast ' + t + ' show'; setTimeout(() => e.classList.remove('show'), 2500); }
function showL(t) { document.getElementById('l-text').textContent = t; document.getElementById('loading').classList.add('show'); }
function hideL() { document.getElementById('loading').classList.remove('show'); }
</script>
